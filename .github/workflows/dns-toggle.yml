name: Dynamic DNS Filter Toggle

on:
  schedule:
    # GitHub ActionsのスケジュールはUTC（協定世界時）で指定します。
    # 日本時間 (JST) 20:40 -> UTC 11:40
    - cron: '40 11 * * *'
    # 日本時間 (JST) 15:40  -> UTC 6:40 (前日)
    - cron: '40 6 * * *'
  workflow_dispatch: # 手動でテスト実行するためのボタンを設置

jobs:
  update-filter:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの書き込み権限を許可

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update DNS List based on JST time
        run: |
          # 現在の日本時間（時間のみ）を取得
          JST_HOUR=$(date -d "+9 hours" +"%H")
          echo "Current JST Hour: $JST_HOUR"

          # 時間帯に応じてscheduled.txtの中身を切り替え
          # 0~16時、20~24時のタイミングならブロックルールを書き込み
          if [ "$JST_HOUR" -lt 16 ] || [ "$JST_HOUR" -ge 20 ] ; then
            echo "||google.com^" > scheduled.txt
            echo "||google.co.jp^" >> scheduled.txt
            echo "Status: Google Blocked"
          else
            # それ以外の時間（16時~19:59）はファイルをクリア（またはコメントのみ）
            echo "! No blocks active" > scheduled.txt
            echo "Status: Google Unblocked"
          fi

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 変更がある場合のみコミットしてプッシュ
          if ! git diff --exit-code scheduled.txt; then
            git add scheduled.txt
            git commit -m "Update DNS filter list [JST $(date -d '+9 hours' +'%Y-%m-%d %H:%M')]"
            git push
          else
            echo "No changes to commit"
          fi
